<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報ジェネレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 16px 48px;
  }

  h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #5b7fff;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 11px;
    color: #555e7a;
    margin-bottom: 28px;
    letter-spacing: 0.06em;
  }

  .card {
    background: #181c27;
    border: 1px solid #252a3a;
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    margin-bottom: 16px;
  }

  .date-label {
    font-size: 11px;
    color: #5b7fff;
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .date-display {
    font-size: 22px;
    font-weight: 700;
    color: #e8eaf0;
    margin-bottom: 2px;
  }

  .day-info {
    font-size: 11px;
    color: #555e7a;
    margin-bottom: 0;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #555e7a;
    margin: 20px 0 10px;
    text-transform: uppercase;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #1e2336;
  }
  .stat-row:last-child { border-bottom: none; }

  .stat-label {
    font-size: 12px;
    color: #8b93af;
  }

  .stat-value {
    font-size: 13px;
    font-weight: 700;
    color: #e8eaf0;
  }

  .stat-value.accent { color: #5b7fff; }

  .progress-bar-wrap {
    margin: 6px 0 18px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #555e7a;
    margin-bottom: 5px;
  }
  .progress-bar {
    background: #1e2336;
    border-radius: 99px;
    height: 5px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, #5b7fff, #8f72ff);
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .text-preview {
    background: #0f1117;
    border: 1px solid #252a3a;
    border-radius: 10px;
    padding: 16px;
    font-size: 12px;
    line-height: 1.85;
    color: #c8ccdb;
    white-space: pre-wrap;
    font-family: 'Hiragino Kaku Gothic ProN', monospace;
    min-height: 180px;
    width: 100%;
    resize: none;
    outline: none;
    cursor: pointer;
  }
  .text-preview:focus {
    border-color: #5b7fff;
  }

  .btn-copy {
    margin-top: 14px;
    width: 100%;
    background: linear-gradient(135deg, #5b7fff, #8f72ff);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.12s;
  }
  .btn-copy:active { opacity: 0.8; transform: scale(0.98); }

  .btn-copy.copied {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
  }

  .btn-regen {
    margin-top: 10px;
    width: 100%;
    background: transparent;
    color: #5b7fff;
    border: 1px solid #252a3a;
    border-radius: 10px;
    padding: 11px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-regen:hover { background: #181c27; }

  .holiday-notice {
    background: #1e1226;
    border: 1px solid #3d1f5c;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: #a78bfa;
    font-size: 13px;
    font-weight: 600;
    margin-top: 8px;
  }

  .chip {
    display: inline-block;
    background: #1e2336;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 10px;
    color: #8f72ff;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<h1>日報ジェネレーター</h1>
<p class="subtitle">LINE貼り付け用 / 自動生成</p>

<div class="card" id="dateCard">
  <div class="date-label">TODAY</div>
  <div class="date-display" id="dateDisplay">—</div>
  <div class="day-info" id="dayInfo">—</div>
</div>

<div class="card" id="mainCard">
  <!-- 稼働状況 -->
  <div id="offDayMsg" class="holiday-notice" style="display:none;">
    🗓 本日は休業日です<br><small style="color:#7a6a9a;font-size:11px;margin-top:4px;display:block;">火曜・水曜はお休みです</small>
  </div>

  <div id="workContent" style="display:none;">
    <div class="section-title">月間進捗</div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span id="progressLabel">アタック累計</span>
        <span id="progressCount">— / 300件</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="section-title">本日 <span class="chip" id="todayWorkDay">—日目</span></div>
    <div class="stat-row"><span class="stat-label">電話アタック</span><span class="stat-value accent" id="d_tel">—</span></div>
    <div class="stat-row"><span class="stat-label">メールアタック</span><span class="stat-value accent" id="d_mail">—</span></div>
    <div class="stat-row"><span class="stat-label">通電</span><span class="stat-value" id="d_tsuden">—</span></div>
    <div class="stat-row"><span class="stat-label">返信</span><span class="stat-value" id="d_henshin">—</span></div>
    <div class="stat-row"><span class="stat-label">アポ取得</span><span class="stat-value" id="d_apo">0</span></div>

    <div class="section-title">累計</div>
    <div class="stat-row"><span class="stat-label">アタック 電話</span><span class="stat-value" id="c_tel">—</span></div>
    <div class="stat-row"><span class="stat-label">アタック メール</span><span class="stat-value" id="c_mail">—</span></div>
    <div class="stat-row"><span class="stat-label">通電</span><span class="stat-value" id="c_tsuden">—</span></div>
    <div class="stat-row"><span class="stat-label">返信</span><span class="stat-value" id="c_henshin">—</span></div>
    <div class="stat-row"><span class="stat-label">アポ取得</span><span class="stat-value" id="c_apo">0</span></div>

    <div class="section-title">LINE用テキスト <small style="color:#555e7a;font-weight:400;letter-spacing:0">↓ タップして全選択→コピー</small></div>
    <textarea class="text-preview" id="lineText" readonly onclick="selectAll(this)">—</textarea>
    <button class="btn-copy" id="copyBtn" onclick="copyText()">📋 コピーする</button>
    <button class="btn-regen" onclick="generate()">🔄 別パターンで生成</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// 出勤日リスト（火・水以外、全出勤）
// ─────────────────────────────────────────────
function buildWorkDays(year, month) {
  const days = [];
  const daysInMonth = new Date(year, month, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(year, month - 1, d).getDay(); // 0=日,1=月,...,6=土
    if (dow !== 2 && dow !== 3) { // 火=2, 水=3 を除外
      days.push(d);
    }
  }
  return days;
}

// ─────────────────────────────────────────────
// 月設定
// ─────────────────────────────────────────────
const MONTH_CONFIG = {
  6: { // 6月
    attack_tel: 50,
    attack_mail: 250,
    tsuden_tel: 12,
    tsuden_mail: 23,
  },
  7: { // 7月
    attack_tel: 50,
    attack_mail: 250,
    tsuden_tel: 12,
    tsuden_mail: 23,
  }
};

// ─────────────────────────────────────────────
// ランダム整数（min以上max以下）
// ─────────────────────────────────────────────
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ─────────────────────────────────────────────
// 進捗率に応じた累計値生成（自然なばらつき付き）
// ─────────────────────────────────────────────
function calcCumulative(target, ratio, totalDays, todayIndex) {
  // ratio: 進捗率（0〜1）
  // ±15%のばらつきを持たせる
  const base = Math.round(target * ratio);
  const jitter = Math.round(target * 0.08); // 8%のブレ
  const min = Math.max(0, base - jitter);
  const max = Math.min(target, base + jitter);
  return randInt(min, max);
}

// ─────────────────────────────────────────────
// 日次の数値を前日累計との差から自然に出す
// ─────────────────────────────────────────────
function calcDaily(cumToday, cumYesterday) {
  const diff = cumToday - cumYesterday;
  return Math.max(0, diff);
}

// ─────────────────────────────────────────────
// メイン生成ロジック
// ─────────────────────────────────────────────
let currentData = null;

function generate() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const day = now.getDate();

  // 日付表示
  const weekNames = ['日','月','火','水','木','金','土'];
  const dow = now.getDay();
  document.getElementById('dateDisplay').textContent = `${month}/${day}（${weekNames[dow]}）`;

  // 対応月チェック
  if (!MONTH_CONFIG[month]) {
    document.getElementById('dayInfo').textContent = '対応月（6月・7月）以外です';
    document.getElementById('offDayMsg').style.display = 'none';
    document.getElementById('workContent').style.display = 'none';
    return;
  }

  const cfg = MONTH_CONFIG[month];
  const workDays = buildWorkDays(year, month);
  const totalWorkDays = workDays.length;

  // 今日が出勤日か
  const isWorkDay = workDays.includes(day);

  if (!isWorkDay) {
    document.getElementById('dayInfo').textContent = `今月の出勤日数：${totalWorkDays}日`;
    document.getElementById('offDayMsg').style.display = 'block';
    document.getElementById('workContent').style.display = 'none';
    return;
  }

  document.getElementById('offDayMsg').style.display = 'none';
  document.getElementById('workContent').style.display = 'block';

  // 今日が何番目の出勤日か（1始まり）
  const todayIndex = workDays.indexOf(day) + 1;
  const ratio = todayIndex / totalWorkDays;

  document.getElementById('dayInfo').textContent = `今月の出勤日数：${totalWorkDays}日`;
  document.getElementById('todayWorkDay').textContent = `${todayIndex}日目`;

  // ───── 累計計算 ─────
  // 前の出勤日（yesterdayIndex）の進捗率
  const prevIndex = todayIndex - 1;
  const prevRatio = prevIndex > 0 ? prevIndex / totalWorkDays : 0;

  // アタック累計（今日）
  const c_tel_today  = calcCumulative(cfg.attack_tel,  ratio, totalWorkDays, todayIndex);
  const c_mail_today = calcCumulative(cfg.attack_mail, ratio, totalWorkDays, todayIndex);

  // アタック累計（前日）
  const c_tel_prev   = Math.round(cfg.attack_tel  * prevRatio * randInt(88,100)/100);
  const c_mail_prev  = Math.round(cfg.attack_mail * prevRatio * randInt(88,100)/100);

  // 通電累計（今日）
  const c_tsuden_today  = calcCumulative(cfg.tsuden_tel,  ratio, totalWorkDays, todayIndex);
  const c_henshin_today = calcCumulative(cfg.tsuden_mail, ratio, totalWorkDays, todayIndex);

  // 通電累計（前日）
  const c_tsuden_prev  = Math.round(cfg.tsuden_tel  * prevRatio * randInt(85,100)/100);
  const c_henshin_prev = Math.round(cfg.tsuden_mail * prevRatio * randInt(85,100)/100);

  // ───── 日次計算（累計差分）─────
  let d_tel      = Math.max(0, c_tel_today  - c_tel_prev);
  let d_mail     = Math.max(0, c_mail_today - c_mail_prev);
  let d_tsuden   = Math.max(0, c_tsuden_today  - c_tsuden_prev);
  let d_henshin  = Math.max(0, c_henshin_today - c_henshin_prev);

  // 最低限メールは1件以上にする（業務感）
  if (d_mail === 0 && d_tel === 0) d_mail = randInt(5, 12);

  // ───── 合計アタック累計 ─────
  const c_attack_total = c_tel_today + c_mail_today;

  // プログレスバー
  const pct = Math.min(100, Math.round(c_attack_total / 300 * 100));
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${c_attack_total} / 300件`;

  // ───── UI反映 ─────
  document.getElementById('d_tel').textContent    = `${d_tel}件`;
  document.getElementById('d_mail').textContent   = `${d_mail}件`;
  document.getElementById('d_tsuden').textContent  = `${d_tsuden}件`;
  document.getElementById('d_henshin').textContent = `${d_henshin}件`;

  document.getElementById('c_tel').textContent    = `${c_tel_today}件`;
  document.getElementById('c_mail').textContent   = `${c_mail_today}件`;
  document.getElementById('c_tsuden').textContent  = `${c_tsuden_today}件`;
  document.getElementById('c_henshin').textContent = `${c_henshin_today}件`;

  // ───── LINEテキスト生成 ─────
  const mm = String(month).padStart(2, '0');
  const dd = String(day).padStart(2, '0');
  const lineText =
`本日の日報をお送りします。
【活動量】日次 
①アタック件数(1日15件)
電話:${d_tel}件 メール:${d_mail}件
②通電・返信
電話：${d_tsuden}件 メール：${d_henshin}件
③アポ取得数
電話：0件 メール：0件
【活動量】累計
①アタック件数(月300件)
電話:${c_tel_today}件 メール:${c_mail_today}件
②通電・返信
電話:${c_tsuden_today}件 メール:${c_henshin_today}件
③アポ取得数(月1件)
電話：0件 メール：0件`;

  document.getElementById('lineText').value = lineText;
  currentData = lineText;

  // コピーボタンリセット
  const btn = document.getElementById('copyBtn');
  btn.textContent = '📋 コピーする';
  btn.classList.remove('copied');
}

function selectAll(el) {
  el.select();
  el.setSelectionRange(0, 99999);
}

function copyText() {
  if (!currentData) return;
  const ta = document.getElementById('lineText');
  const btn = document.getElementById('copyBtn');

  // まずtextareaを全選択
  ta.select();
  ta.setSelectionRange(0, 99999);

  // clipboard API → fallback execCommand
  const success = () => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 コピーする';
      btn.classList.remove('copied');
    }, 2500);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentData).then(success).catch(() => {
      try { document.execCommand('copy'); success(); } catch(e) {}
    });
  } else {
    try { document.execCommand('copy'); success(); } catch(e) {}
  }
}

// 初期実行
generate();
</script>
</body>
</html>
